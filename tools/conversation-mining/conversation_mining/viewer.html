function getReadingModeLabel(mode) {
  if (mode === 'mainline') return '主线';
  if (mode === 'forensics') return '全量';
  return '主线 + 子代理';
}

function getMessageText(msg) {
  return String((msg && (msg.content || msg.text)) || '');
}

function stripMarkdownForText(text) {
  return String(text || '')
    .replace(/```[\s\S]*?```/g, ' ')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/!\[[^\]]*\]\([^)]+\)/g, ' ')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/[*_>#-]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function truncateText(text, maxChars) {
  var clean = stripMarkdownForText(text);
  if (clean.length <= maxChars) return clean;
  return clean.slice(0, Math.max(0, maxChars - 1)).trimEnd() + '…';
}

function normalizeInlineText(text) {
  return String(text || '').replace(/\s+/g, ' ').trim();
}

function buildHeaderTitlePayload(title) {
  var clean = normalizeInlineText(title);
  if (!clean) return { preview: 'Untitled', full: '', expandable: false };
  if (clean.length <= 220) return { preview: clean, full: clean, expandable: false };
  return {
    preview: clean.slice(0, 220).trimEnd() + '…',
    full: clean,
    expandable: true,
  };
}

function findLastRoleIndex(messages, role) {
  for (var i = messages.length - 1; i >= 0; i--) {
    if ((messages[i].role || '').toLowerCase() === role) return i;
  }
  return -1;
}

function hasStructuredContent(text) {
  return /```|^#{1,3}\s|^\s*[-*]\s+|^\s*\d+\.\s+|\n\n|`[^`\n]+`/m.test(String(text || ''));
}

function containsFileLikeText(text) {
  return /\/Users\/|(?:^|[`(\s])(?:docs|apps|packages|dashboard|extensions|lib|src)\/[\w./-]+\.(?:py|html|md|tsx?|jsx?|json|sh|css|scss|toml|ya?ml)\b/m.test(String(text || ''));
}

function containsCommandLikeText(text) {
  return /```(?:bash|sh|shell|zsh)?|(?:^|\n)\s*(?:\$ )?(?:python3|python|git|npm|pnpm|yarn|uv|pytest|npx|node|bash|sh|rg|ls|cd|open)\b/m.test(String(text || ''));
}

function isLikelyOperationalAssistantText(text) {
  var plain = stripMarkdownForText(text).toLowerCase();
  if (!plain) return false;
  if (hasStructuredContent(text) && plain.length > 220) return false;
  if (plain.length > 260) return false;
  var patterns = [
    /^let me\b/,
    /^now let me\b/,
    /^i(?:'|’)ll\b/,
    /^i will\b/,
    /^i'm going to\b/,
    /^checking\b/,
    /^looking\b/,
    /^exploring\b/,
    /^reviewing\b/,
    /^我先/,
    /^让我/,
    /^我现在/,
    /^接下来/,
    /^继续/,
    /^先看/,
    /^我去/,
    /^现在我/,
    /^我先把/,
    /^我先检查/,
    /^我先确认/,
    /^我现在直接/,
  ];
  for (var i = 0; i < patterns.length; i++) {
    if (patterns[i].test(plain)) return true;
  }
  return false;
}

function isImportantAssistantMessage(msg, index, messages, lastAssistantIndex) {
  if ((msg.role || '').toLowerCase() !== 'assistant') return false;
  var text = getMessageText(msg);
  if (!text.trim()) return false;
  if (index === lastAssistantIndex) return true;
  if (hasStructuredContent(text)) return true;
  if (containsFileLikeText(text) && text.length > 120) return true;
  if (containsCommandLikeText(text) && text.length > 120) return true;
  if (!isLikelyOperationalAssistantText(text) && stripMarkdownForText(text).length > 220) return true;
  return false;
}

function isSummaryCandidateAssistantMessage(msg, index, messages, lastAssistantIndex) {
  if ((msg.role || '').toLowerCase() !== 'assistant') return false;
  var text = getMessageText(msg);
  var plain = stripMarkdownForText(text);
  if (!plain) return false;
  if (isLikelyOperationalAssistantText(text) && index === lastAssistantIndex) return false;
  if (hasStructuredContent(text)) return true;
  if (containsFileLikeText(text) && plain.length > 100) return true;
  if (containsCommandLikeText(text) && plain.length > 100) return true;
  if (!isLikelyOperationalAssistantText(text) && plain.length > 180) return true;
  if (/(已经|完成|结果|结论|建议|下一步|总结|处理完|修好了|搞定|done|fixed|recommend|summary|result)/i.test(plain) && plain.length > 80) return true;
  return false;
}

function shouldRenderMessageForMode(msg, index, messages, conv, analysis) {
  var role = (msg.role || 'user').toLowerCase();
  if (readingMode === 'forensics') return true;
  if (role === 'user') return true;
  if (role === 'subagent_call') return readingMode === 'mainline_plus' && !isSubagentConversation(conv);
  if (role === 'assistant') return !!analysis.importantAssistantIndexes[index];
  return false;
}

function normalizePathCandidate(path) {
  var cleaned = String(path || '')
    .replace(/^[[(`'"]+/, '')
    .replace(/[\])`'":;,。！？]+$/, '')
    .trim();
  if (!cleaned) return '';
  if (cleaned.indexOf('/Users/') === 0) return cleaned;
  if (/^(docs|apps|packages|dashboard|extensions|lib|src)\//.test(cleaned)) return cleaned;
  if (/^[\w./-]+\.(?:py|html|md|tsx?|jsx?|json|sh|css|scss|toml|ya?ml)$/.test(cleaned)) return cleaned;
  return '';
}

function pushUniqueItem(target, seen, value, limit) {
  if (!value || seen[value]) return;
  seen[value] = true;
  if (target.length < limit) target.push(value);
}

function extractFileMentions(messages) {
  var files = [];
  var seen = {};
  var absolutePathRe = /\/Users\/[^\s<>)\]"'`]+/g;
  var relativePathRe = /(?:docs|apps|packages|dashboard|extensions|lib|src)\/[\w./-]+\.(?:py|html|md|tsx?|jsx?|json|sh|css|scss|toml|ya?ml)\b/g;
  var backtickFileRe = /`([^`\n]+?\.(?:py|html|md|tsx?|jsx?|json|sh|css|scss|toml|ya?ml))`/g;
  for (var i = 0; i < messages.length; i++) {
    var text = getMessageText(messages[i]);
    var match;
    while ((match = absolutePathRe.exec(text)) !== null) {
      pushUniqueItem(files, seen, normalizePathCandidate(match[0]), 6);
    }
    while ((match = relativePathRe.exec(text)) !== null) {
      pushUniqueItem(files, seen, normalizePathCandidate(match[0]), 6);
    }
    while ((match = backtickFileRe.exec(text)) !== null) {
      pushUniqueItem(files, seen, normalizePathCandidate(match[1]), 6);
    }
    absolutePathRe.lastIndex = 0;
    relativePathRe.lastIndex = 0;
    backtickFileRe.lastIndex = 0;
  }
  return files;
}

function normalizeCommandLine(line) {
  var normalized = String(line || '').trim();
  if (!normalized) return '';
  normalized = normalized.replace(/^\$\s+/, '');
  normalized = normalized.replace(/^\([^)]+\)\s+➜\s+/, '');
  normalized = normalized.replace(/^\/[^\n]*\s+(?=(python3|python|git|npm|pnpm|yarn|uv|pytest|npx|node|bash|sh|rg|ls|cd|open)\b)/, '');
  normalized = normalized.replace(/^[~\/\w.-]+(?:\s+git:\([^)]+\))?\s+[✗✔]?\s*(?=(python3|python|git|npm|pnpm|yarn|uv|pytest|npx|node|bash|sh|rg|ls|cd|open)\b)/, '');
  return normalized.trim();
}

function looksLikeCommandLine(line) {
  return /^(python3|python|git|npm|pnpm|yarn|uv|pytest|npx|node|bash|sh|rg|ls|cd|open)\b/.test(normalizeCommandLine(line));
}

function extractCommandMentions(messages) {
  var commands = [];
  var seen = {};
  var fenceRe = /```(?:bash|sh|shell|zsh)?\n?([\s\S]*?)```/g;
  for (var i = 0; i < messages.length; i++) {
    var text = getMessageText(messages[i]);
    var match;
    while ((match = fenceRe.exec(text)) !== null) {
      var blockLines = match[1].split(/\n+/);
      for (var j = 0; j < blockLines.length; j++) {
        var blockLine = normalizeCommandLine(blockLines[j]);
        if (looksLikeCommandLine(blockLine)) {
          pushUniqueItem(commands, seen, truncateText(blockLine, 120), 6);
        }
      }
    }
    fenceRe.lastIndex = 0;
    var lines = text.split(/\n+/);
    for (var k = 0; k < lines.length; k++) {
      var line = normalizeCommandLine(lines[k]);
      if (looksLikeCommandLine(line)) {
        pushUniqueItem(commands, seen, truncateText(line, 120), 6);
      }
    }
  }
  return commands;
}

function extractDecisionSignals(messages, analysis) {
  var signals = [];
  var seen = {};
  var keywordRe = /(结论|建议|下一步|计划|风险|原因|判断|推荐|todo|next step|recommend|decision|risk|plan|should|need to)/i;
  for (var i = 0; i < messages.length; i++) {
    if (!analysis.importantAssistantIndexes[i]) continue;
    var text = getMessageText(messages[i]);
    var lines = text.split(/\n+/);
    for (var j = 0; j < lines.length; j++) {
      var line = lines[j].trim();
      line = line.replace(/^[-*]\s+/, '').replace(/^\d+\.\s+/, '');
      if (!line || line.length < 14 || line.length > 180) continue;
      if (!keywordRe.test(line)) continue;
      pushUniqueItem(signals, seen, truncateText(line, 160), 4);
    }
  }
  return signals;
}

function analyzeConversation(messages) {
  var lastAssistantIndex = findLastRoleIndex(messages, 'assistant');
  var importantAssistantIndexes = {};
  for (var i = 0; i < messages.length; i++) {
    if (isImportantAssistantMessage(messages[i], i, messages, lastAssistantIndex)) {
      importantAssistantIndexes[i] = true;
    }
  }
  var finalAssistantIndex = lastAssistantIndex;
  for (var j = messages.length - 1; j >= 0; j--) {
    if ((messages[j].role || '').toLowerCase() === 'assistant' && importantAssistantIndexes[j]) {
      finalAssistantIndex = j;
      break;
    }
  }
  var summaryAssistantIndex = -1;
  for (var k = messages.length - 1; k >= 0; k--) {
    if (isSummaryCandidateAssistantMessage(messages[k], k, messages, lastAssistantIndex)) {
      summaryAssistantIndex = k;
      break;
    }
  }
  return {
    lastAssistantIndex: lastAssistantIndex,
    finalAssistantIndex: finalAssistantIndex,
    summaryAssistantIndex: summaryAssistantIndex,
    importantAssistantIndexes: importantAssistantIndexes,
  };
}

function buildQuickSummary(messages, analysis) {
  var finalAnswerText = '';
  var summaryIndex = analysis.summaryAssistantIndex >= 0 ? analysis.summaryAssistantIndex : analysis.finalAssistantIndex;
  if (summaryIndex >= 0) {
    finalAnswerText = truncateText(getMessageText(messages[summaryIndex]), 520);
  }
  return {
    finalAnswer: finalAnswerText,
    finalAssistantIndex: summaryIndex,
    files: extractFileMentions(messages),
    commands: extractCommandMentions(messages),
    signals: extractDecisionSignals(messages, analysis),
  };
}

function renderSummarySection(title, items, emptyText, lineClass) {
  var html = '<div class="summary-card"><div class="summary-card-header">' +
    '<div class="summary-card-title">' + escapeHtml(title) + '</div>' +
    '</div>';
  if (!items.length) {
    html += '<div class="summary-empty">' + escapeHtml(emptyText) + '</div>';
  } else {
    html += '<div class="' + lineClass + '">';
    for (var i = 0; i < items.length; i++) {
      var cls = lineClass === 'summary-chip-list' ? 'summary-chip' : 'summary-line';
      html += '<div class="' + cls + '" title="' + escapeAttr(items[i]) + '">' + escapeHtml(items[i]) + '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderQuickSummary(summary) {
  var finalHtml = '<div class="summary-card summary-final"><div class="summary-card-header">' +
    '<div class="summary-card-title">Final answer</div>';
  if (summary.finalAssistantIndex >= 0) {
    finalHtml += '<button class="summary-jump-btn" id="jump-final-answer-btn" data-target-index="' + summary.finalAssistantIndex + '">Jump to reply</button>';
  }
  finalHtml += '</div>';
  if (summary.finalAnswer) {
    finalHtml += '<div class="summary-final-text">' + escapeHtml(summary.finalAnswer) + '</div>';
  } else {
    finalHtml += '<div class="summary-empty">没有找到明确的主回复结论。</div>';
  }
  finalHtml += '</div>';

  return '<div class="quick-summary">' +
    finalHtml +
    renderSummarySection('Key files', summary.files, '这段对话里没有抓到明显的文件路径。', 'summary-chip-list') +
    renderSummarySection('Commands', summary.commands, '这段对话里没有抓到明显的命令。', 'summary-chip-list') +
    renderSummarySection('Signals', summary.signals, '没有抓到明确的“结论 / 建议 / 下一步”标记。', 'summary-line-list') +
    '</div>';
}

function renderTimeline(events) {
  var html = '<div class="summary-card summary-timeline"><div class="summary-card-header">' +
    '<div class="summary-card-title">Timeline replay</div>' +
    '</div>';
  if (!events.length) {
    html += '<div class="summary-empty">这段对话里没有足够稳定的结构化事件可回放。</div>';
    html += '</div>';
    return html;
  }
  html += '<div class="timeline-list">';
  for (var i = 0; i < events.length; i++) {
    var event = events[i];
    html += '<button class="timeline-event" data-target-type="' + escapeAttr(event.targetType) + '" data-target-id="' + escapeAttr(event.targetId || '') + '">' +
      '<div class="timeline-event-kind">' + escapeHtml(event.kind) + '</div>' +
      '<div class="timeline-event-main">' +
      '<div class="timeline-event-title">' + escapeHtml(event.title) + '</div>' +
      (event.meta ? '<div class="timeline-event-meta">' + escapeHtml(event.meta) + '</div>' : '') +
      '</div>' +
      '</button>';
  }
  html += '</div></div>';
  return html;
}

function renderRelatedThreads(related) {
  var html = '<div class="summary-card summary-related"><div class="summary-card-header">' +
    '<div class="summary-card-title">Related task threads</div>' +
    '</div>';
  if (!related.length) {
    html += '<div class="summary-empty">当前没有找到足够稳定的相关任务会话。</div>';
    html += '</div>';
    return html;
  }
  html += '<div class="related-thread-list">';
  for (var i = 0; i < related.length; i++) {
    var item = related[i];
    var conv = item.conv;
    var title = conv.title || conv.name || conv.id || 'Untitled';
    var meta = [
      conv.source || '',
      conv.date || '',
      item.reason || '',
    ].filter(Boolean).join(' · ');
    html += '<button class="related-thread-btn" data-related-id="' + escapeAttr(conv.id || '') + '">' +
      '<div class="related-thread-main">' +
      '<div class="related-thread-title">' + escapeHtml(title) + '</div>' +
      '<div class="related-thread-meta">' + escapeHtml(meta) + '</div>' +
      '</div>' +
      '<div class="related-thread-score">score ' + escapeHtml(String(item.score)) + '</div>' +
      '</button>';
  }
  html += '</div></div>';
  return html;
}

function toFileUrl(path) {
  return encodeURI('file://' + String(path || ''));
}

function formatArtifactMeta(artifact) {
  var parts = [];
  if (artifact.rel_path) parts.push(artifact.rel_path);
  if (artifact.artifact_type) parts.push(artifact.artifact_type.replace(/^ARTIFACT_TYPE_/, '').toLowerCase());
  if (artifact.updated_at) parts.push(artifact.updated_at.replace('T', ' ').replace('Z', ''));
  return parts.join(' · ');
}

function renderArtifactsSection(conv) {
  if (!conv || sourceKey(conv.source) !== 'ag') return '';
  var artifacts = Array.isArray(conv.artifacts) ? conv.artifacts : [];
  var brainDir = String(conv.brain_dir || '').trim();
  var html = '<div class="summary-card summary-artifacts"><div class="summary-card-header">' +
    '<div class="summary-card-title">Artifacts</div>' +
    '</div>';
  if (brainDir) {
    html += '<div class="artifact-list">';
    html += '<a class="artifact-link" href="' + escapeAttr(toFileUrl(brainDir)) + '" target="_blank" rel="noopener">' +
      '<div class="artifact-main">' +
      '<div class="artifact-title">Open brain workspace</div>' +
      '<div class="artifact-path">' + escapeHtml(brainDir) + '</div>' +
      '</div>' +
      '<div class="artifact-open">Open</div>' +
      '</a>';
  }
  if (!artifacts.length) {
    html += '<div class="summary-empty">这条 AG 会话没有找到已落盘的主产物文件。</div>';
    if (brainDir) html += '</div>';
    html += '</div>';
    return html;
  }
  if (!brainDir) html += '<div class="artifact-list">';
  for (var i = 0; i < artifacts.length; i++) {
    var artifact = artifacts[i];
    var title = artifact.title || artifact.name || artifact.rel_path || 'artifact';
    var meta = formatArtifactMeta(artifact);
    html += '<a class="artifact-link" href="' + escapeAttr(toFileUrl(artifact.path || '')) + '" target="_blank" rel="noopener">' +
      '<div class="artifact-main">' +
      '<div class="artifact-title">' + escapeHtml(title) + '</div>' +
      (meta ? '<div class="artifact-meta">' + escapeHtml(meta) + '</div>' : '') +
      (artifact.path ? '<div class="artifact-path">' + escapeHtml(artifact.path) + '</div>' : '') +
      '</div>' +
      '<div class="artifact-open">Open</div>' +
      '</a>';
  }
  html += '</div></div>';
  return html;
}

function flashAndScrollToElement(element) {
  if (!element) return;
  element.classList.add('flash-focus');
  element.scrollIntoView({ block: 'center', behavior: 'smooth' });
  setTimeout(function() { element.classList.remove('flash-focus'); }, 1400);
}

function timelineTitleFromMessage(msg, maxChars) {
  return truncateText(getMessageText(msg), maxChars || 110) || 'Untitled event';
}

function pushTimelineEvent(events, seen, event) {
  if (!event || !event.targetType || !event.targetId) return;
  var key = event.targetType + ':' + event.targetId;
  if (seen[key]) return;
  seen[key] = true;
  events.push(event);
}

function openSubagentDetails(detailsId) {
  if (!detailsId) return;
  var details = document.getElementById(detailsId);
  if (!details) return;
  details.open = true;
  details.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function normalizeTags(tags) {
  var source = Array.isArray(tags) ? tags : String(tags || '').split(',');
  var next = [];
  var seen = {};
  for (var i = 0; i < source.length; i++) {
    var tag = String(source[i] || '').trim();
    if (!tag) continue;
    var key = tag.toLowerCase();
    if (seen[key]) continue;
    seen[key] = true;
    next.push(tag);
  }
  return next.slice(0, 12);
}

function normalizeCurationRecord(record) {
  var safe = record || {};
  return {
    starred: !!safe.starred,
    novel: !!safe.novel,
    collection: String(safe.collection || '').trim(),
    tags: normalizeTags(safe.tags || []),
  };
}

function isEmptyCurationRecord(record) {
  return !record.starred && !record.novel && !record.collection && !record.tags.length;
}

function loadCurationState() {
  try {
    var saved = localStorage.getItem(CURATION_STORAGE_KEY);
    if (!saved) {
      curationState = { conversations: {} };
      return;
    }
    var parsed = JSON.parse(saved);
    curationState = {
      conversations: parsed && parsed.conversations ? parsed.conversations : {},
    };
  } catch (e) {
    curationState = { conversations: {} };
  }
}

function saveCurationState() {
  try {
    localStorage.setItem(CURATION_STORAGE_KEY, JSON.stringify(curationState));
  } catch (e) {}
}

function getConversationCuration(id) {
  return normalizeCurationRecord((curationState.conversations || {})[id] || {});
}

function updateConversationCuration(id, patch) {
  var next = normalizeCurationRecord(Object.assign({}, getConversationCuration(id), patch || {}));
  if (isEmptyCurationRecord(next)) {
    delete curationState.conversations[id];
  } else {
    curationState.conversations[id] = next;
  }
  saveCurationState();
}

function renderCurationPills(record, limit) {
  var pills = [];
  if (record.starred) pills.push('<span class="conv-pill starred">★ 收藏</span>');
  if (record.novel) pills.push('<span class="conv-pill novel">新颖</span>');
  if (record.collection) pills.push('<span class="conv-pill" title="' + escapeAttr(record.collection) + '">分类：' + escapeHtml(record.collection) + '</span>');
  var tagLimit = typeof limit === 'number' ? limit : record.tags.length;
  for (var i = 0; i < record.tags.length && i < tagLimit; i++) {
    pills.push('<span class="conv-pill" title="' + escapeAttr(record.tags[i]) + '">#' + escapeHtml(record.tags[i]) + '</span>');
  }
  return pills.join('');
}

function rerenderCurrentConversation(preserveScroll) {
  var scrollTop = 0;
  var currentMessages = document.getElementById('messages');
  if (preserveScroll && currentMessages) scrollTop = currentMessages.scrollTop;
  renderList();
  if (selectedId) {
    selectConversation(selectedId);
    var nextMessages = document.getElementById('messages');
    if (preserveScroll && nextMessages) nextMessages.scrollTop = scrollTop;
  }
}

function renderList() {
  renderSecondaryControls();
  var q = searchQuery.toLowerCase();
  filtered = allConversations.filter(function(c) {
    var sk = sourceKey(c.source);
    var curation = getConversationCuration(c.id || '');
    if (isSubagentConversation(c)) return false;
    if (activeFilter !== 'all' && sk !== activeFilter) return false;
    if (starredOnly && !curation.starred) return false;
    if (novelOnly && !curation.novel) return false;
    if (activeWorkspace !== 'all' && getWorkspaceKey(c) !== activeWorkspace) return false;
    if (activeTag && curation.tags.map(function(tag){ return tag.toLowerCase(); }).indexOf(activeTag.toLowerCase()) < 0) return false;
    if (q) {
      var title = (c.title || c.name || '').toLowerCase();
      var msgs = (allMessages[c.id] || c.messages || []).map(function(m){ return m.content || m.text || ''; }).join(' ').toLowerCase();
      var artifactText = ((c.artifacts || []).map(function(a) {
        return [a.name || '', a.title || '', a.rel_path || ''].join(' ');
      }).join(' ') + ' ' + (c.brain_dir || '')).toLowerCase();
      var meta = (curation.collection + ' ' + curation.tags.join(' ') + ' ' + getWorkspaceLabel(getWorkspaceKey(c)) + ' ' + artifactText).toLowerCase();
      if (title.indexOf(q) < 0 && msgs.indexOf(q) < 0 && meta.indexOf(q) < 0) return false;
    }
    return true;
  });

  filtered.sort(function(a,b) {
    return conversationSortTime(b) - conversationSortTime(a);
  });

  document.getElementById('stats').textContent = filtered.length + ' / ' + getVisibleConversationBaseCount();

  var groups = groupMode === 'workspace' ? groupByWorkspace(filtered) : groupByDate(filtered);
  var list = document.getElementById('conv-list');

  if (filtered.length === 0) {
    list.innerHTML = '<div id="empty-state"><div class="icon">&#128269;</div><h3>No results</h3><p>Try a different search or filter.</p></div>';
    return;
  }

  var html = '';
  for (var g = 0; g < groups.length; g++) {
    var group = groups[g];
    html += '<div class="date-group-label"' + (group.title ? ' title="' + escapeAttr(group.title) + '"' : '') + '>' + escapeHtml(group.label) + '</div>';
    var convs = group.items;
    for (var i = 0; i < convs.length; i++) {
      var c = convs[i];
      var id = c.id || '';
      var curation = getConversationCuration(id);
      var title = c.title || c.name || 'Untitled';
      var msgCount = getDisplayMessageCount(c);
      var sel = id === selectedId ? ' selected' : '';
      var displayTitle = highlight(escapeHtml(title), searchQuery);
      var listPills = renderCurationPills(curation, 2);
      var starHtml = curation.starred ? '<span class="conv-star">★</span>' : '';
      if (groupMode !== 'workspace') {
        var workspaceKey = getWorkspaceKey(c);
        if (workspaceKey && workspaceKey !== '(unknown workspace)') {
          listPills = '<span class="conv-pill" title="' + escapeAttr(getWorkspaceLabel(workspaceKey)) + '">工作区：' + escapeHtml(getWorkspaceShortLabel(workspaceKey)) + '</span>' + listPills;
        }
      }
      html += '<div class="conv-card' + sel + '" data-id="' + escapeAttr(id) + '" tabindex="0">' +
        '<div class="conv-card-header">' + badgeFor(c.source) +
        '<div class="conv-title-row">' + starHtml +
        '<span class="conv-title" title="' + escapeAttr(title) + '">' + displayTitle + '</span></div></div>' +
        (listPills ? '<div class="conv-shelf-meta">' + listPills + '</div>' : '') +
        '<div class="conv-meta"><span class="conv-count">' + msgCount + ' msg' + (msgCount !== 1 ? 's' : '') + '</span>' +
        '<button class="copy-id-btn" data-id="' + escapeAttr(id) + '" title="Copy ID">ID</button></div>' +
        '</div>';
      // Sub-agent expandable section
      var subs = subagentsByParentSessionId[c.session_id] || [];
      if (subs.length > 0) {
        html += '<div class="subagent-toggle" data-parent-session="' + escapeAttr(c.session_id) + '"><span class="arrow">&#9654;</span>' + subs.length + ' sub-agents</div>';
        html += '<div class="subagent-list" data-parent-session="' + escapeAttr(c.session_id) + '">';
        for (var s = 0; s < subs.length; s++) {
          var sub = subs[s];
          var subId = sub.id || '';
          var subSel = subId === selectedId ? ' selected' : '';
          var subTitle = (sub.title || sub.subagent_summary || 'Sub-agent').substring(0, 60);
          html += '<div class="subagent-item' + subSel + '" data-id="' + escapeAttr(subId) + '">' +
            badgeFor(sub.source) + ' <span>' + escapeHtml(subTitle) + '</span></div>';
        }
        html += '</div>';
      }
    }
  }
  list.innerHTML = html;

  list.querySelectorAll('.conv-card').forEach(function(card) {
    card.addEventListener('click', function(e) {
      if (e.target.classList.contains('copy-id-btn')) return;
      selectConversation(card.dataset.id);
    });
    card.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') selectConversation(card.dataset.id);
    });
  });

  list.querySelectorAll('.copy-id-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      copyId(btn.dataset.id, btn);
    });
  });

  // Sub-agent toggle and item click handlers
  list.querySelectorAll('.subagent-toggle').forEach(function(toggle) {
    toggle.addEventListener('click', function(e) {
      e.stopPropagation();
      var key = toggle.dataset.parentSession;
      var subList = list.querySelector('.subagent-list[data-parent-session="' + CSS.escape(key) + '"]');
      if (subList) {
        var exp = subList.classList.toggle('expanded');
        toggle.classList.toggle('expanded', exp);
      }
    });
  });
  list.querySelectorAll('.subagent-item').forEach(function(item) {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      selectConversation(item.dataset.id);
    });
  });
}

function copyId(id, btn) {
  copyText(id, btn, 'ID');
}

function selectConversation(id) {
  selectedId = id;
  syncLocationHash(id);
  document.querySelectorAll('.conv-card').forEach(function(c) {
    c.classList.toggle('selected', c.dataset.id === id);
  });

  var conv = null;
  for (var i = 0; i < allConversations.length; i++) {
    if (allConversations[i].id === id) { conv = allConversations[i]; break; }
  }
  if (!conv) return;

  var right = document.getElementById('right');
  // Show loading indicator while fetching messages
  right.innerHTML = '<div class="loading"><div class="spinner"></div> Loading conversation...</div>';

  loadMessagesForConversation(id, function(loadedMessages) {
    // Store in allMessages for backwards compatibility
    if (loadedMessages && loadedMessages.length) {
      allMessages[id] = loadedMessages;
    }
    _renderConversation(conv, loadedMessages || []);
  });
}

function _renderConversation(conv, messages) {
  var id = conv.id;
  var right = document.getElementById('right');
  var title = conv.title || conv.name || 'Untitled';
  var titlePayload = buildHeaderTitlePayload(title);
  var analysis = analyzeConversation(messages);
  var summary = buildQuickSummary(messages, analysis);
  var msgCount = getDisplayMessageCount(conv);
  var dateStr = conversationDisplayDate(conv);
  var dateLabel = dateStr ? new Date(dateStr).toLocaleString() : '';
  var transcriptPath = getConversationFilePath(conv);
  var viewerLink = getConversationViewerLink(conv);
  var curation = getConversationCuration(id);
  var workspaceKey = getWorkspaceKey(conv);
  var workspaceMeta = workspaceKey && workspaceKey !== '(unknown workspace)' ? ' &nbsp;&middot;&nbsp; <span title="' + escapeAttr(getWorkspaceLabel(workspaceKey)) + '">workspace: ' + escapeHtml(getWorkspaceShortLabel(workspaceKey)) + '</span>' : '';
  var relatedTaskThreads = getRelatedTaskConversations(conv);
  var relatedSubagents = getRelatedSubagentConversations(conv);
  var usedSubagentIds = {};
  var subagentCallRecords = [];
  var timelineEvents = [];
  var timelineSeen = {};
  var visibleCount = 0;

  var msgsHtml = '';
  for (var j = 0; j < messages.length; j++) {
    var msg = messages[j];
    var role = (msg.role || 'user').toLowerCase();
    if (role === 'user') {
      pushTimelineEvent(timelineEvents, timelineSeen, {
        kind: '用户发起',
        title: timelineTitleFromMessage(msg, 118),
        meta: '第 ' + (j + 1) + ' 条消息',
        targetType: 'message',
        targetId: 'message-' + j,
      });
    }
    if (role === 'subagent_call' && !isSubagentConversation(conv)) {
      var matches = matchSubagentsForCall(msg, relatedSubagents, usedSubagentIds);
      var callLabel = buildSubagentLabelFromCall(msg);
      var detailsId = 'subagent-details-' + (subagentCallRecords.length + 1);
      var callIndex = subagentCallRecords.length + 1;
      subagentCallRecords.push({
        detailsId: detailsId,
        title: callLabel,
        meta: matches.length ? (matches.length + ' 个子代理会话') : '未找到导出的子代理 transcript',
        originLabel: '第 ' + callIndex + ' 处 Agent 调用',
      });
      pushTimelineEvent(timelineEvents, timelineSeen, {
        kind: '子代理调用',
        title: callLabel,
        meta: '第 ' + callIndex + ' 处 Agent 调用',
        targetType: 'subagent',
        targetId: detailsId,
      });
      msg.detailsId = detailsId;
      msg.originLabel = '从这里调用子代理 · 第 ' + callIndex + ' 处';
      if (shouldRenderMessageForMode(msg, j, messages, conv, analysis)) {
        visibleCount += 1;
        msgsHtml += renderSubagentBlock(msg, matches, '');
      }
      continue;
    }
    if (!shouldRenderMessageForMode(msg, j, messages, conv, analysis)) continue;
    var content = msg.content || msg.text || '';
    var roleLabel = role === 'assistant' ? 'Assistant' : role === 'system' ? 'System' : 'User';
    var emphasisClass = role === 'assistant' && j === analysis.finalAssistantIndex ? ' emphasis' : '';
    if (role === 'assistant') {
      var eventKind = j === summary.finalAssistantIndex ? '最终答复' : (isLikelyOperationalAssistantText(content) ? '主代理推进' : '主代理输出');
      pushTimelineEvent(timelineEvents, timelineSeen, {
        kind: eventKind,
        title: timelineTitleFromMessage(msg, 124),
        meta: '第 ' + (j + 1) + ' 条消息',
        targetType: 'message',
        targetId: 'message-' + j,
      });
    }
    visibleCount += 1;
    msgsHtml += '<div class="message ' + role + emphasisClass + '" id="message-' + j + '">' +
      '<div class="message-role">' + roleLabel + '</div>' +
      '<div class="message-body">' + renderMarkdown(content) + '</div>' +
      '</div>';
  }

  if (!isSubagentConversation(conv) && readingMode !== 'mainline') {
    var unmatched = [];
    for (var k = 0; k < relatedSubagents.length; k++) {
      if (!usedSubagentIds[relatedSubagents[k].id]) unmatched.push(relatedSubagents[k]);
    }
    if (unmatched.length) {
      var unmatchedDetailsId = 'subagent-details-' + (subagentCallRecords.length + 1);
      subagentCallRecords.push({
        detailsId: unmatchedDetailsId,
        title: 'Additional sub-agent calls',
        meta: unmatched.length + ' 个未精确定位的子代理会话',
        originLabel: '未匹配到具体调用位置',
      });
      pushTimelineEvent(timelineEvents, timelineSeen, {
        kind: '子代理调用',
        title: 'Additional sub-agent calls',
        meta: '未匹配到具体调用位置',
        targetType: 'subagent',
        targetId: unmatchedDetailsId,
      });
      msgsHtml += renderSubagentBlock({
        description: 'Additional sub-agent calls',
        text: '',
        detailsId: unmatchedDetailsId,
        originLabel: '未匹配到具体调用位置',
      }, unmatched, 'Additional sub-agent calls');
      visibleCount += 1;
    }
  }

  var subagentBtnHtml = '';
  if (!isSubagentConversation(conv) && subagentCallRecords.length) {
    var subagentMenuHtml = '<div class="subagent-menu" id="subagent-menu" hidden>' +
      '<div class="subagent-menu-header">当前主会话中的子代理调用</div>';
    for (var s = 0; s < subagentCallRecords.length; s++) {
      var record = subagentCallRecords[s];
      subagentMenuHtml += '<button class="subagent-menu-item" data-details-id="' + escapeAttr(record.detailsId) + '">' +
        '<div class="subagent-menu-title">' + escapeHtml(record.originLabel + ' · ' + record.title) + '</div>' +
        '<div class="subagent-menu-meta">' + escapeHtml(record.meta) + '</div>' +
        '</button>';
    }
    subagentMenuHtml += '</div>';
    subagentBtnHtml =
      '<button class="header-action-btn" id="toggle-subagents-btn">Sub-agents (' + subagentCallRecords.length + ')</button>' +
      subagentMenuHtml;
  }

  var modeButtonsHtml =
    '<div class="reading-modes" aria-label="阅读模式">' +
    '<button class="reading-mode-btn' + (readingMode === 'mainline' ? ' active' : '') + '" data-mode="mainline">主线</button>' +
    '<button class="reading-mode-btn' + (readingMode === 'mainline_plus' ? ' active' : '') + '" data-mode="mainline_plus">主线 + 子代理</button>' +
    '<button class="reading-mode-btn' + (readingMode === 'forensics' ? ' active' : '') + '" data-mode="forensics">全量</button>' +
    '</div>';

  var toolbarHtml =
    '<div id="conv-header-toolbar">' +
    modeButtonsHtml +
    '<div class="mode-note">当前视图：' + getReadingModeLabel(readingMode) + ' · 显示 ' + visibleCount + ' / ' + msgCount + ' 条主消息</div>' +
    '</div>';

  var curationPreview = renderCurationPills(curation);
  var curationHtml =
    '<div id="curation-bar">' +
    '<button class="curation-toggle-btn' + (curation.starred ? ' active' : '') + '" id="bookmark-btn">' + (curation.starred ? '★ 已收藏' : '☆ 收藏') + '</button>' +
    '<button class="curation-toggle-btn' + (curation.novel ? ' active' : '') + '" id="novel-btn">' + (curation.novel ? '新颖已标记' : '标记新颖') + '</button>' +
    '<input class="curation-input" id="collection-input" placeholder="分类文件夹，例如：writing / architecture" value="' + escapeAttr(curation.collection) + '">' +
    '<input class="curation-input" id="tags-input" placeholder="标签，用逗号分隔" value="' + escapeAttr(curation.tags.join(', ')) + '">' +
    '<button class="curation-save-btn" id="save-curation-btn">保存沉淀</button>' +
    '</div>' +
    (curationPreview ? '<div class="curation-preview" id="curation-preview">' + curationPreview + '</div>' : '<div class="curation-preview empty" id="curation-preview">还没加入收藏、标签或分类。</div>');

  right.innerHTML =
    '<div id="conv-header">' +
    '<div id="conv-header-top">' +
    '<div class="conv-header-main"><div class="conv-title-shell' + (titlePayload.expandable ? '' : ' expanded') + '" id="conv-title-shell">' +
    '<h2 class="conv-title-preview" title="' + escapeAttr(titlePayload.full) + '">' + escapeHtml(titlePayload.preview) + '</h2>' +
    '<div class="conv-title-full"><h2>' + escapeHtml(titlePayload.full) + '</h2></div>' +
    (titlePayload.expandable ? '<button class="conv-title-toggle" id="conv-title-toggle">展开标题</button>' : '') +
    '</div>' +
    '<div id="conv-header-meta">' + badgeFor(conv.source) +
    '&nbsp; ' + msgCount + ' messages' +
    (dateLabel ? ' &nbsp;&middot;&nbsp; ' + dateLabel : '') +
    workspaceMeta +
    ' &nbsp;&middot;&nbsp; <span style="color:var(--text3);font-size:11px">' + escapeHtml(id) + '</span>' +
    '</div></div>' +
    '<div id="conv-header-actions">' +
    subagentBtnHtml +
    (transcriptPath ? '<button class="header-action-btn" id="open-markdown-btn" title="' + escapeAttr(transcriptPath) + '">Open Markdown</button>' : '') +
    '<button class="header-action-btn" id="copy-ref-btn" title="' + escapeAttr(transcriptPath) + '">Copy ref</button>' +
    '<button class="header-action-btn" id="copy-prompt-btn" title="' + escapeAttr(viewerLink) + '">Copy prompt</button>' +
    '</div></div>' +
    toolbarHtml +
    curationHtml +
    '</div>' +
    '<div id="messages"><div class="messages-inner">' + renderQuickSummary(summary) + renderArtifactsSection(conv) + renderTimeline(timelineEvents) + renderRelatedThreads(relatedTaskThreads) + (msgsHtml || '<div id="no-selection">No messages</div>') + '</div></div>';

  var copyRefBtn = document.getElementById('copy-ref-btn');
  if (copyRefBtn) {
    copyRefBtn.addEventListener('click', function() {
      copyText(buildConversationRef(conv), copyRefBtn, 'Copy ref');
    });
  }
  var openMarkdownBtn = document.getElementById('open-markdown-btn');
  if (openMarkdownBtn) {
    openMarkdownBtn.addEventListener('click', function() {
      window.open(toFileUrl(transcriptPath), '_blank');
    });
  }
  var convTitleToggle = document.getElementById('conv-title-toggle');
  var convTitleShell = document.getElementById('conv-title-shell');
  if (convTitleToggle && convTitleShell) {
    convTitleToggle.addEventListener('click', function() {
      var expanded = convTitleShell.classList.toggle('expanded');
      convTitleToggle.textContent = expanded ? '收起标题' : '展开标题';
    });
  }
  var copyPromptBtn = document.getElementById('copy-prompt-btn');
  if (copyPromptBtn) {
    copyPromptBtn.addEventListener('click', function() {
      copyText(buildConversationPrompt(conv), copyPromptBtn, 'Copy prompt');
    });
  }
  var subagentToggleBtn = document.getElementById('toggle-subagents-btn');
  var subagentMenu = document.getElementById('subagent-menu');
  if (subagentToggleBtn && subagentMenu) {
    subagentToggleBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      subagentMenu.hidden = !subagentMenu.hidden;
    });
    subagentMenu.querySelectorAll('.subagent-menu-item').forEach(function(btn) {
      btn.addEventListener('click', function() {
        subagentMenu.hidden = true;
        if (readingMode === 'mainline') {
          applyReadingMode('mainline_plus');
          saveReadingModePreference();
          selectConversation(selectedId);
          setTimeout(function() {
            openSubagentDetails(btn.dataset.detailsId);
          }, 0);
          return;
        }
        openSubagentDetails(btn.dataset.detailsId);
      });
    });
    document.addEventListener('click', function closeSubagentMenu(ev) {
      if (!subagentMenu.contains(ev.target) && ev.target !== subagentToggleBtn) {
        subagentMenu.hidden = true;
        document.removeEventListener('click', closeSubagentMenu);
      }
    });
  }

  document.querySelectorAll('.reading-mode-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (btn.dataset.mode === readingMode) return;
      applyReadingMode(btn.dataset.mode);
      saveReadingModePreference();
      selectConversation(selectedId);
    });
  });

  var jumpFinalBtn = document.getElementById('jump-final-answer-btn');
  if (jumpFinalBtn) {
    jumpFinalBtn.addEventListener('click', function() {
      var target = document.getElementById('message-' + jumpFinalBtn.dataset.targetIndex);
      if (!target) return;
      flashAndScrollToElement(target);
    });
  }
  document.querySelectorAll('.timeline-event').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (btn.dataset.targetType === 'subagent') {
        if (readingMode === 'mainline') {
          applyReadingMode('mainline_plus');
          saveReadingModePreference();
          selectConversation(selectedId);
          setTimeout(function() {
            openSubagentDetails(btn.dataset.targetId);
          }, 0);
          return;
        }
        openSubagentDetails(btn.dataset.targetId);
        return;
      }
      var target = document.getElementById(btn.dataset.targetId);
      if (!target) return;
      flashAndScrollToElement(target);
    });
  });
  document.querySelectorAll('.related-thread-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      selectConversation(btn.dataset.relatedId);
    });
  });

  var collectionInput = document.getElementById('collection-input');
  var tagsInput = document.getElementById('tags-input');
  var curationPreviewEl = document.getElementById('curation-preview');
  var buildPendingCurationPatch = function(extraPatch) {
    return Object.assign({
      collection: collectionInput ? collectionInput.value : '',
      tags: tagsInput ? tagsInput.value : '',
    }, extraPatch || {});
  };
  var refreshCurationUi = function() {
    var record = getConversationCuration(id);
    if (bookmarkBtn) {
      bookmarkBtn.textContent = record.starred ? '★ 已收藏' : '☆ 收藏';
      bookmarkBtn.classList.toggle('active', record.starred);
    }
    if (novelBtn) {
      novelBtn.textContent = record.novel ? '新颖已标记' : '标记新颖';
      novelBtn.classList.toggle('active', record.novel);
    }
    if (curationPreviewEl) {
      var previewHtml = renderCurationPills(record);
      curationPreviewEl.classList.toggle('empty', !previewHtml);
      curationPreviewEl.innerHTML = previewHtml || '还没加入收藏、标签或分类。';
    }
    renderList();
  };
  var saveCuration = function() {
    updateConversationCuration(id, buildPendingCurationPatch());
    rerenderCurrentConversation(true);
  };

  var bookmarkBtn = document.getElementById('bookmark-btn');
  if (bookmarkBtn) {
    bookmarkBtn.addEventListener('click', function() {
      updateConversationCuration(id, {
        starred: !getConversationCuration(id).starred,
      });
      refreshCurationUi();
    });
  }
  var novelBtn = document.getElementById('novel-btn');
  if (novelBtn) {
    novelBtn.addEventListener('click', function() {
      updateConversationCuration(id, {
        novel: !getConversationCuration(id).novel,
      });
      refreshCurationUi();
    });
  }
  var saveCurationBtn = document.getElementById('save-curation-btn');
  if (saveCurationBtn) {
    saveCurationBtn.addEventListener('click', saveCuration);
  }
  [collectionInput, tagsInput].forEach(function(input) {
    if (!input) return;
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') saveCuration();
    });
  });
}

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
  e.preventDefault();
  var idx = -1;
  for (var i = 0; i < filtered.length; i++) {
    if (filtered[i].id === selectedId) { idx = i; break; }
  }
  var next = idx;
  if (e.key === 'ArrowDown') next = Math.min(idx + 1, filtered.length - 1);
  if (e.key === 'ArrowUp') next = Math.max(idx - 1, 0);
  if (next !== idx && filtered[next]) {
    selectConversation(filtered[next].id);
    var card = document.querySelector('.conv-card[data-id="' + CSS.escape(filtered[next].id) + '"]');
    if (card) card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
});

document.getElementById('filter-group').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', b === btn);
  });
  renderList();
});

document.getElementById('saved-filter-group').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  var filterKey = btn.dataset.savedFilter;
  if (filterKey === 'starred') {
    starredOnly = !starredOnly;
    btn.classList.toggle('active', starredOnly);
  }
  if (filterKey === 'novel') {
    novelOnly = !novelOnly;
    btn.classList.toggle('active', novelOnly);
  }
  renderList();
});

document.getElementById('group-mode-group').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  groupMode = btn.dataset.groupMode || 'date';
  renderList();
});

document.getElementById('workspace-filter').addEventListener('change', function(e) {
  activeWorkspace = e.target.value || 'all';
  renderList();
});

document.getElementById('tag-filter-bar').addEventListener('click', function(e) {
  var btn = e.target.closest('.tag-filter-btn');
  if (!btn) return;
  activeTag = btn.dataset.tagFilter || '';
  renderList();
});

document.getElementById('search').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  renderList();
});

document.getElementById('theme-btn').addEventListener('click', function() {
  applyTheme(!isDark);
  saveThemePreference();
});

window.addEventListener('hashchange', selectConversationFromLocation);

loadThemePreference();
loadReadingModePreference();
loadCurationState();
loadData();
</script>
</body>
</html>
