<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation Browser</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --accent: #58a6ff;
    --user-bg: #1c2128;
    --asst-bg: #161b22;
    --code-bg: #1f2428;
    --badge-claude: #1d4ed8;
    --badge-codex: #166534;
    --badge-ag: #6b21a8;
    --hover: #1f2937;
    --selected: #0d2137;
    --selected-border: #58a6ff;
  }
  .light {
    --bg: #f7f2e8;
    --bg2: #fbf7ef;
    --bg3: #efe5d5;
    --border: #dccfb9;
    --text: #2f2418;
    --text2: #6a5845;
    --text3: #94826f;
    --accent: #b86a2f;
    --user-bg: #f3e7d6;
    --asst-bg: #fffdf8;
    --code-bg: #efe4d2;
    --badge-claude: #d8e7ff;
    --badge-codex: #dff2df;
    --badge-ag: #f0e2ff;
    --hover: #efe7dc;
    --selected: #f2dfc7;
    --selected-border: #b86a2f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* Top bar */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #topbar h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-right: 4px;
    white-space: nowrap;
  }
  .filter-group {
    display: flex;
    gap: 4px;
  }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: var(--hover); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .light .filter-btn.active { color: #fff; }
  #search {
    flex: 1;
    min-width: 160px;
    max-width: 320px;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text3); }
  #stats { font-size: 12px; color: var(--text3); white-space: nowrap; }
  #theme-btn {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  #theme-btn { margin-left: auto; }
  #theme-btn:hover { background: var(--hover); color: var(--text); }
  #subbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px 10px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .subbar-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text3);
  }
  #workspace-filter {
    min-width: 220px;
    max-width: 360px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    font-size: 12px;
    outline: none;
  }
  #workspace-filter:focus {
    border-color: var(--accent);
  }
  #tag-filter-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag-filter-btn {
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
  }
  .tag-filter-btn:hover {
    background: var(--hover);
    color: var(--text);
  }
  .tag-filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  /* Main layout */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  /* Left panel */
  #left {
    width: 320px;
    min-width: 240px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    min-height: 0;
  }
  #conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  #conv-list::-webkit-scrollbar { width: 4px; }
  #conv-list::-webkit-scrollbar-track { background: transparent; }
  #conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .date-group-label {
    padding: 6px 14px 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 1;
  }
  .conv-card {
    padding: 10px 14px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s;
    position: relative;
  }
  .conv-card:hover { background: var(--hover); }
  .conv-card.selected {
    background: var(--selected);
    border-left-color: var(--selected-border);
  }
  .subagent-toggle {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; color: var(--text3); cursor: pointer;
    padding: 2px 6px; border-radius: 4px; margin-left: 14px;
    transition: all 0.15s; user-select: none;
  }
  .subagent-toggle:hover { color: var(--accent); background: var(--bg3); }
  .subagent-toggle .arrow { font-size: 9px; transition: transform 0.15s; display: inline-block; }
  .subagent-toggle.expanded .arrow { transform: rotate(90deg); }
  .subagent-list {
    max-height: 0; overflow: hidden; transition: max-height 0.2s ease;
    background: var(--bg); border-left: 2px solid var(--border); margin-left: 14px;
  }
  .subagent-list.expanded { max-height: 2000px; }
  .subagent-item {
    padding: 6px 10px; cursor: pointer; font-size: 12px; color: var(--text2);
    border-bottom: 1px solid var(--border); transition: background 0.1s;
    display: flex; align-items: center; gap: 6px;
  }
  .subagent-item:last-child { border-bottom: 0; }
  .subagent-item:hover { background: var(--hover); color: var(--text); }
  .subagent-item.selected { background: var(--selected); color: var(--text); }
  .conv-card-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .conv-title-row {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    flex: 1;
  }
  .conv-star {
    font-size: 12px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    flex-shrink: 0;
  }
  .badge-claude { background: var(--badge-claude); color: #93c5fd; }
  .badge-codex  { background: var(--badge-codex);  color: #86efac; }
  .badge-ag     { background: var(--badge-ag);     color: #d8b4fe; }
  .light .badge-claude { color: #1d4ed8; }
  .light .badge-codex  { color: #166534; }
  .light .badge-ag     { color: #6b21a8; }
  .conv-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .conv-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .conv-shelf-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 6px;
  }
  .conv-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    line-height: 1;
    padding: 4px 7px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text3);
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .conv-pill.starred {
    color: var(--accent);
    border-color: rgba(88, 166, 255, 0.3);
  }
  .conv-pill.novel {
    color: #d97706;
    border-color: rgba(217, 119, 6, 0.26);
  }
  .conv-count {
    font-size: 11px;
    color: var(--text3);
  }
  .copy-id-btn {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .copy-id-btn:hover { background: var(--hover); color: var(--text2); }
  .copy-id-btn.copied { color: #3fb950; border-color: #3fb950; }
  /* Right panel */
  #right {
    flex: 1;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    overflow: hidden;
    min-width: 0;
    min-height: 0;
  }
  #conv-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  #conv-header h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
    line-height: 1.45;
    word-break: break-word;
  }
  .conv-header-main {
    min-width: 0;
    flex: 1;
  }
  .conv-title-shell {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
    max-height: 132px;
    overflow: hidden;
  }
  .conv-title-preview {
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 3;
    overflow: hidden;
  }
  .conv-title-full {
    display: none;
    max-height: 84px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .conv-title-shell.expanded .conv-title-preview {
    display: none;
  }
  .conv-title-shell.expanded .conv-title-full {
    display: block;
  }
  .conv-title-toggle {
    align-self: flex-start;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
  }
  .conv-title-toggle:hover {
    background: var(--hover);
    color: var(--text);
  }
  #conv-header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  #conv-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .header-action-btn {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .header-action-btn:hover {
    background: var(--hover);
    color: var(--text);
  }
  .header-action-btn.copied {
    color: #3fb950;
    border-color: #3fb950;
  }
  #conv-header-actions {
    position: relative;
  }
  .subagent-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: 320px;
    max-height: 420px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    box-shadow: 0 18px 44px rgba(0,0,0,0.28);
    z-index: 30;
  }
  .subagent-menu-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text2);
    background: var(--bg2);
  }
  .subagent-menu-item {
    display: block;
    width: 100%;
    padding: 10px 12px;
    border: 0;
    border-bottom: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    text-align: left;
    cursor: pointer;
  }
  .subagent-menu-item:last-child { border-bottom: 0; }
  .subagent-menu-item:hover { background: var(--hover); }
  .subagent-menu-title {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .subagent-menu-meta {
    font-size: 11px;
    color: var(--text3);
  }
  #conv-header-meta {
    font-size: 12px;
    color: var(--text3);
  }
  #conv-header-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .reading-modes {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--bg);
  }
  .reading-mode-btn {
    border: 0;
    background: transparent;
    color: var(--text2);
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .reading-mode-btn:hover {
    background: var(--hover);
    color: var(--text);
  }
  .reading-mode-btn.active {
    background: var(--accent);
    color: #fff;
  }
  .mode-note {
    font-size: 11px;
    color: var(--text3);
  }
  #curation-bar {
    display: grid;
    grid-template-columns: auto auto minmax(180px, 1fr) minmax(220px, 1.2fr) auto;
    gap: 8px;
    margin-top: 10px;
  }
  .curation-toggle-btn,
  .curation-save-btn {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    padding: 7px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  .curation-toggle-btn:hover,
  .curation-save-btn:hover {
    background: var(--hover);
    color: var(--text);
  }
  .curation-toggle-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .curation-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
  }
  .curation-input:focus {
    border-color: var(--accent);
  }
  .curation-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .curation-preview.empty {
    font-size: 12px;
    color: var(--text3);
  }
  #messages {
    overflow-y: auto;
    height: 100%;
    min-height: 0;
    padding: 16px 20px;
    overscroll-behavior: contain;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .messages-inner {
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }
  .quick-summary {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 18px;
  }
  .summary-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg2);
    padding: 12px 14px;
    min-width: 0;
  }
  .summary-card.summary-final {
    grid-column: 1 / -1;
  }
  .summary-card.summary-timeline {
    grid-column: 1 / -1;
  }
  .summary-card.summary-related {
    grid-column: 1 / -1;
  }
  .summary-card.summary-artifacts {
    grid-column: 1 / -1;
  }
  .summary-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .summary-card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .summary-jump-btn {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
  }
  .summary-jump-btn:hover {
    background: var(--hover);
    color: var(--text);
  }
  .summary-final-text {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text2);
    white-space: pre-wrap;
  }
  .summary-chip-list,
  .summary-line-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .summary-chip {
    display: block;
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .summary-line {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text2);
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
  }
  .summary-empty {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.6;
  }
  .timeline-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .timeline-event {
    width: 100%;
    display: grid;
    grid-template-columns: 96px minmax(0, 1fr);
    gap: 10px;
    align-items: start;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg3);
    color: var(--text);
    padding: 10px 12px;
    text-align: left;
    cursor: pointer;
  }
  .timeline-event:hover {
    background: var(--hover);
  }
  .timeline-event-kind {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 700;
    padding-top: 2px;
  }
  .timeline-event-main {
    min-width: 0;
  }
  .timeline-event-title {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 3px;
  }
  .timeline-event-meta {
    font-size: 11px;
    color: var(--text3);
    line-height: 1.5;
  }
  .related-thread-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .related-thread-btn {
    width: 100%;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: start;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg3);
    color: var(--text);
    padding: 10px 12px;
    text-align: left;
    cursor: pointer;
  }
  .related-thread-btn:hover {
    background: var(--hover);
  }
  .related-thread-main {
    min-width: 0;
  }
  .related-thread-title {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 4px;
  }
  .related-thread-meta {
    font-size: 11px;
    color: var(--text3);
    line-height: 1.5;
  }
  .related-thread-score {
    font-size: 11px;
    color: var(--accent);
    border: 1px solid rgba(88, 166, 255, 0.25);
    border-radius: 999px;
    padding: 4px 8px;
    white-space: nowrap;
  }
  .artifact-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .artifact-link {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: start;
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg3);
    color: var(--text);
    padding: 10px 12px;
  }
  .artifact-link:hover {
    background: var(--hover);
  }
  .artifact-main {
    min-width: 0;
  }
  .artifact-title {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 4px;
  }
  .artifact-meta,
  .artifact-path {
    font-size: 11px;
    color: var(--text3);
    line-height: 1.5;
    word-break: break-all;
  }
  .artifact-open {
    font-size: 11px;
    color: var(--accent);
    border: 1px solid rgba(88, 166, 255, 0.25);
    border-radius: 999px;
    padding: 4px 8px;
    white-space: nowrap;
  }
  .message {
    margin-bottom: 16px;
    border-radius: 8px;
    overflow: hidden;

<script>
const DATA_PATH = (function() {
  if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
    return './conversations.json';
  }
  return 'file:///Users/lizeyu/.claude/exported_conversations/conversations.json';
})();
const EXPORT_BASE_PATH = '/Users/lizeyu/.claude/exported_conversations';
const THEME_STORAGE_KEY = 'conversation-mining-theme';
const READING_MODE_STORAGE_KEY = 'conversation-mining-reading-mode';
const CURATION_STORAGE_KEY = 'conversation-mining-curation-v1';

let allConversations = [];
let allMessages = {};
let filtered = [];
let selectedId = null;
let activeFilter = 'all';
let searchQuery = '';
let isDark = true;
let readingMode = 'mainline_plus';
let subagentsByParentSessionId = {};
let conversationMetaById = {};
let curationState = { conversations: {} };
let starredOnly = false;
let novelOnly = false;
let workspaceOptions = [];
let activeWorkspace = 'all';
let groupMode = 'date';
let activeTag = '';

function loadData() {
  var indexEl = document.getElementById('conv-index');
  try {
    var indexText = indexEl ? indexEl.textContent.trim() : '';
    if (indexText && indexText !== '[]') {
      allConversations = JSON.parse(indexText);
      // Messages are now loaded on-demand per conversation, not all at once
      buildDerivedIndexes();
      requestAnimationFrame(renderList);
      requestAnimationFrame(selectConversationFromLocation);
      return;
    }
  } catch(e) {}
  // fallback: fetch (dev mode)
  fetch(DATA_PATH).then(function(r){ return r.json(); }).then(function(data){
    allConversations = Array.isArray(data) ? data : (data.conversations || []);
    buildDerivedIndexes();
    requestAnimationFrame(renderList);
    requestAnimationFrame(selectConversationFromLocation);
  }).catch(showError);
}

var _messageCache = {};
var _allDataCache = null;
function loadMessagesForConversation(id, callback) {
  if (allMessages[id]) { callback(allMessages[id]); return; }
  if (_messageCache[id]) { callback(_messageCache[id]); return; }
  // Check conv.messages
  for (var i = 0; i < allConversations.length; i++) {
    if (allConversations[i].id === id && allConversations[i].messages && allConversations[i].messages.length) {
      _messageCache[id] = allConversations[i].messages;
      callback(_messageCache[id]);
      return;
    }
  }
  // Fetch from conversations.json
  fetch(DATA_PATH).then(function(r){ return r.json(); }).then(function(data){
    var convs = Array.isArray(data) ? data : (data.conversations || []);
    // Cache all messages from the response
    for (var i = 0; i < convs.length; i++) {
      var c = convs[i];
      if (c.messages && c.messages.length) {
        _messageCache[c.id] = c.messages;
      }
    }
    if (_messageCache[id]) {
      callback(_messageCache[id]);
    } else {
      callback([]);
    }
  }).catch(function(){ callback([]); });
}

function showError(err) {
  document.getElementById('conv-list').innerHTML =
    '<div id="empty-state">' +
    '<div class="icon">&#9888;&#65039;</div>' +
    '<h3>Could not load conversations</h3>' +
    '<p>' + escapeHtml(err.message) + '</p>' +
    '<p>If you see a CORS/security error, open with:</p>' +
    '<code>open -a "Google Chrome" --args --allow-file-access-from-files ~/.claude/skills/conversation-mining/viewer.html</code>' +
    '<p style="margin-top:8px">Or use Safari (local file access allowed by default).</p>' +
    '<p>Expected file:<br><code>/Users/lizeyu/.claude/exported_conversations/conversations.json</code></p>' +
    '</div>';
}

function renderMarkdown(text) {
  if (!text) return '';
  let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_,lang,code){
    return '<pre><code>' + code.trimEnd() + '</code></pre>';
  });
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  s = s.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  s = s.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, function(m){ return '<ul>' + m + '</ul>'; });
  s = s.replace(/\n\n+/g, '</p><p>');
  s = '<p>' + s + '</p>';
  s = s.replace(/(?<!>)\n(?!<)/g, '<br>');
  s = s.replace(/<p>\s*<\/p>/g, '');
  return s;
}

function highlight(text, query) {
  if (!query) return text;
  var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark class="highlight">$1</mark>');
}

function isSubagentConversation(conv) {
  if (!conv) return false;
  if (conv.is_subagent) return true;
  var file = String(conv.file || '').toLowerCase();
  var project = String(conv.project || '').toLowerCase();
  return file.indexOf('subagents_') >= 0 || project === 'subagents';
}

function buildDerivedIndexes() {
  subagentsByParentSessionId = {};
  conversationMetaById = {};
  for (var i = 0; i < allConversations.length; i++) {
    var conv = allConversations[i];
    conversationMetaById[conv.id] = buildConversationMeta(conv);
    if (!isSubagentConversation(conv)) continue;
    var parentId = conv.parent_session_id || '';
    if (!parentId) continue;
    if (!subagentsByParentSessionId[parentId]) subagentsByParentSessionId[parentId] = [];
    subagentsByParentSessionId[parentId].push(conv);
  }
  for (var key in subagentsByParentSessionId) {
    subagentsByParentSessionId[key].sort(function(a, b) {
      return String(a.first_ts || a.date || '').localeCompare(String(b.first_ts || b.date || ''));
    });
  }
  workspaceOptions = collectWorkspaceOptions();
  renderSecondaryControls();
}

function normalizePromptText(text) {
  return String(text || '').replace(/\s+/g, ' ').trim();
}

function normalizeWorkspacePath(project) {
  var cleaned = String(project || '')
    .replace(/[\u0000-\u001f]+/g, '')
    .replace(/file:\/*/g, '/')
    .replace(/\)+file:\/*/g, '/')
    .replace(/^Users\//, '/Users/')
    .replace(/^\/+Users\//, '/Users/')
    .replace(/\/{2,}/g, '/')
    .replace(/\/+$/, '')
    .trim();
  if (!cleaned) return '';
  var worktreeMatch = cleaned.match(/^\/Users\/([^/]+)\/\.codex\/worktrees\/[^/]+\/([^/]+)/);
  if (worktreeMatch) {
    return '/Users/' + worktreeMatch[1] + '/Projects/' + worktreeMatch[2];
  }
  var projectMatch = cleaned.match(/^\/Users\/([^/]+)\/Projects\/([^/]+)/);
  if (projectMatch) {
    return '/Users/' + projectMatch[1] + '/Projects/' + projectMatch[2];
  }
  return cleaned;
}

function getWorkspaceKey(conv) {
  return normalizeWorkspacePath(conv && conv.project) || '(unknown workspace)';
}

function getWorkspaceLabel(key) {
  if (!key || key === '(unknown workspace)') return 'Unknown workspace';
  return key;
}

function getWorkspaceShortLabel(key) {
  if (!key || key === '(unknown workspace)') return 'Unknown';
  var parts = key.split('/').filter(Boolean);
  if (!parts.length) return key;
  if (parts.length >= 2) {
    return parts[parts.length - 1] + ' · ' + parts[parts.length - 2];
  }
  return parts[parts.length - 1];
}

function collectWorkspaceOptions() {
  var seen = {};
  var items = [];
  for (var i = 0; i < allConversations.length; i++) {
    var conv = allConversations[i];
    if (isSubagentConversation(conv)) continue;
    var key = getWorkspaceKey(conv);
    if (seen[key]) continue;
    seen[key] = true;
    items.push(key);
  }
  items.sort(function(a, b) {
    return getWorkspaceLabel(a).localeCompare(getWorkspaceLabel(b));
  });
  return items;
}

function collectSavedTags() {
  var tags = [];
  var seen = {};
  var conversations = (curationState && curationState.conversations) || {};
  for (var id in conversations) {
    var record = normalizeCurationRecord(conversations[id]);
    for (var i = 0; i < record.tags.length; i++) {
      var tag = record.tags[i];
      var key = tag.toLowerCase();
      if (seen[key]) continue;
      seen[key] = true;
      tags.push(tag);
    }
  }
  tags.sort(function(a, b) { return a.localeCompare(b); });
  return tags;
}

function renderSecondaryControls() {
  var workspaceSelect = document.getElementById('workspace-filter');
  if (workspaceSelect) {
    var workspaceHtml = '<option value="all">全部工作区</option>';
    for (var i = 0; i < workspaceOptions.length; i++) {
      var key = workspaceOptions[i];
      workspaceHtml += '<option value="' + escapeAttr(key) + '"' + (activeWorkspace === key ? ' selected' : '') + '>' + escapeHtml(getWorkspaceShortLabel(key)) + '</option>';
    }
    workspaceSelect.innerHTML = workspaceHtml;
    workspaceSelect.title = activeWorkspace === 'all' ? '全部工作区' : getWorkspaceLabel(activeWorkspace);
  }
  var tagBar = document.getElementById('tag-filter-bar');
  if (tagBar) {
    var tags = collectSavedTags();
    if (activeTag && tags.indexOf(activeTag) < 0) activeTag = '';
    var tagHtml = '<button class="tag-filter-btn' + (!activeTag ? ' active' : '') + '" data-tag-filter="">全部标签</button>';
    for (var j = 0; j < tags.length; j++) {
      tagHtml += '<button class="tag-filter-btn' + (activeTag === tags[j] ? ' active' : '') + '" data-tag-filter="' + escapeAttr(tags[j]) + '">#' + escapeHtml(tags[j]) + '</button>';
    }
    tagBar.innerHTML = tagHtml;
  }
  document.querySelectorAll('#group-mode-group .filter-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.groupMode === groupMode);
  });
}

function tokenizeTitleForTaskCluster(text) {
  var source = String(text || '');
  var tokens = [];
  var seen = {};
  var english = source.toLowerCase().match(/[a-z0-9][a-z0-9._/-]{2,}/g) || [];
  for (var i = 0; i < english.length; i++) {
    var token = english[i];
    if (seen[token]) continue;
    seen[token] = true;
    tokens.push(token);
  }
  var hanSegments = source.match(/[\u4e00-\u9fff]{2,}/g) || [];
  for (var j = 0; j < hanSegments.length; j++) {
    var segment = hanSegments[j];
    if (segment.length <= 6) {
      if (!seen[segment]) {
        seen[segment] = true;
        tokens.push(segment);
      }
      continue;
    }
    for (var k = 0; k <= segment.length - 4; k += 2) {
      var gram = segment.slice(k, k + 4);
      if (gram.length < 3 || seen[gram]) continue;
      seen[gram] = true;
      tokens.push(gram);
    }
  }
  return tokens.slice(0, 18);
}

function toSetMap(items) {
  var set = {};
  for (var i = 0; i < items.length; i++) set[items[i]] = true;
  return set;
}

function countSharedItems(a, b) {
  var count = 0;
  for (var key in a) {
    if (b[key]) count += 1;
  }
  return count;
}

function buildConversationMeta(conv) {
  var messages = getConversationMessages(conv);
  var curation = getConversationCuration(conv.id || '');
  var workspaceKey = getWorkspaceKey(conv);
  var files = extractFileMentions(messages);
  var titleTokens = tokenizeTitleForTaskCluster(conv.title || conv.name || '');
  var tags = normalizeTags(curation.tags || []);
  return {
    workspaceKey: workspaceKey,
    files: files,
    fileSet: toSetMap(files),
    titleTokens: titleTokens,
    titleTokenSet: toSetMap(titleTokens),
    tags: tags,
    tagSet: toSetMap(tags.map(function(tag) { return tag.toLowerCase(); })),
    collection: String(curation.collection || '').trim().toLowerCase(),
  };
}

function buildRelatedTaskReason(parts) {
  return parts.join(' · ');
}

function scoreRelatedConversation(baseConv, candidate) {
  if (!baseConv || !candidate || baseConv.id === candidate.id) return null;
  if (isSubagentConversation(candidate)) return null;
  var baseMeta = conversationMetaById[baseConv.id] || buildConversationMeta(baseConv);
  var candidateMeta = conversationMetaById[candidate.id] || buildConversationMeta(candidate);
  var score = 0;
  var reasons = [];

  if (baseMeta.workspaceKey && candidateMeta.workspaceKey && baseMeta.workspaceKey === candidateMeta.workspaceKey) {
    score += 4;
    reasons.push('same workspace');
  } else {
    return null;
  }

  if ((baseConv.source || '') === (candidate.source || '')) {
    score += 1;
  }

  if (baseMeta.collection && candidateMeta.collection && baseMeta.collection === candidateMeta.collection) {
    score += 4;
    reasons.push('same collection');
  }

  var sharedTags = countSharedItems(baseMeta.tagSet, candidateMeta.tagSet);
  if (sharedTags) {
    score += sharedTags * 3;
    reasons.push(sharedTags + ' shared tag' + (sharedTags > 1 ? 's' : ''));
  }

  var sharedFiles = countSharedItems(baseMeta.fileSet, candidateMeta.fileSet);
  if (sharedFiles) {
    score += sharedFiles * 4;
    reasons.push(sharedFiles + ' shared file' + (sharedFiles > 1 ? 's' : ''));
  }

  var sharedTitleTokens = countSharedItems(baseMeta.titleTokenSet, candidateMeta.titleTokenSet);
  if (sharedTitleTokens) {
    score += sharedTitleTokens * 2;
    reasons.push(sharedTitleTokens + ' title overlap');
  }

  var baseDate = conversationSortTime(baseConv);
  var candidateDate = conversationSortTime(candidate);
  if (baseDate && candidateDate) {
    var diffDays = Math.abs(baseDate - candidateDate) / 86400000;
    if (diffDays <= 2) score += 1;
  }

  if (score < 6) return null;
  return {
    conv: candidate,
    score: score,
    reason: buildRelatedTaskReason(reasons),
  };
}

function getRelatedTaskConversations(conv) {
  var matches = [];
  for (var i = 0; i < allConversations.length; i++) {
    var candidate = allConversations[i];
    var scored = scoreRelatedConversation(conv, candidate);
    if (scored) matches.push(scored);
  }
  matches.sort(function(a, b) {
    if (b.score !== a.score) return b.score - a.score;
    return conversationSortTime(b.conv) - conversationSortTime(a.conv);
  });
  return matches.slice(0, 8);
}

function promptsMatch(a, b) {
  var na = normalizePromptText(a);
  var nb = normalizePromptText(b);
  if (!na || !nb) return false;
  if (na === nb) return true;
  var shortA = na.slice(0, 220);
  var shortB = nb.slice(0, 220);
  return shortA === shortB || shortA.indexOf(shortB) >= 0 || shortB.indexOf(shortA) >= 0;
}

function getVisibleConversationBaseCount() {
  var count = 0;
  for (var i = 0; i < allConversations.length; i++) {
    if (!isSubagentConversation(allConversations[i])) count += 1;
  }
  return count;
}

function getConversationMessages(conv) {
  return allMessages[conv.id] || conv.messages || [];
}

function getDisplayMessageCount(conv) {
  if (conv.user_msg_count !== undefined || conv.assistant_msg_count !== undefined) {
    return (conv.user_msg_count || 0) + (conv.assistant_msg_count || 0);
  }
  var msgs = getConversationMessages(conv);
  var count = 0;
  for (var i = 0; i < msgs.length; i++) {
    if ((msgs[i].role || '').toLowerCase() !== 'subagent_call') count += 1;
  }
  return count;
}

function getRelatedSubagentConversations(conv) {
  if (!conv || isSubagentConversation(conv)) return [];
  return (subagentsByParentSessionId[conv.session_id] || []).slice();
}

function getSubagentDisplayName(conv) {
  return conv.subagent_summary || conv.title || 'Sub-agent';
}

function buildSubagentLabelFromCall(msg) {
  var label = msg.description || msg.text || 'Sub-agent call';
  return normalizePromptText(label).slice(0, 100) || 'Sub-agent call';
}

function matchSubagentsForCall(callMsg, candidates, usedIds) {
  var matches = [];
  for (var i = 0; i < candidates.length; i++) {
    var conv = candidates[i];
    if (usedIds[conv.id]) continue;
    if (promptsMatch(callMsg.prompt || callMsg.text || '', conv.launch_prompt || '')) {
      matches.push(conv);
    }
  }
  if (!matches.length) return matches;
  for (var j = 0; j < matches.length; j++) usedIds[matches[j].id] = true;
  return matches;
}

function renderSubagentConversation(conv) {
  var msgs = getConversationMessages(conv);
  var html = '<div class="subagent-conv">' +
    '<div class="subagent-conv-header">' +
    '<div class="subagent-conv-title">' + escapeHtml(getSubagentDisplayName(conv)) + '</div>' +
    '<div class="subagent-conv-meta">' + escapeHtml(conv.project || '') +
    ' &nbsp;&middot;&nbsp; ' + getDisplayMessageCount(conv) + ' messages</div>' +
    '</div><div class="subagent-messages">';
  for (var i = 0; i < msgs.length; i++) {
    var msg = msgs[i];
    var role = (msg.role || 'user').toLowerCase();
    if (role === 'subagent_call') continue;
    var roleLabel = role === 'assistant' ? 'Assistant' : role === 'system' ? 'System' : 'User';
    html += '<div class="subagent-message ' + role + '">' +
      '<div class="subagent-message-role">' + roleLabel + '</div>' +
      '<div class="subagent-message-body">' + renderMarkdown(msg.text || msg.content || '') + '</div>' +
      '</div>';
  }
  html += '</div></div>';
  return html;
}

function renderSubagentBlock(callMsg, matches, fallbackTitle) {
  var title = fallbackTitle || buildSubagentLabelFromCall(callMsg);
  var meta = matches.length ? (matches.length + ' related sub-agent conversation' + (matches.length > 1 ? 's' : '')) : 'No linked exported transcript';
  var detailsId = callMsg.detailsId || '';
  var origin = callMsg.originLabel || ('从这里调用：' + title);
  var html = '<div class="message subagent-call">' +
    '<div class="message-role">Sub-agent</div>' +
    '<div class="subagent-call-origin">' + escapeHtml(origin) + '</div>' +
    '<div class="subagent-shell">' +
    '<details class="subagent-block"' + (detailsId ? ' id="' + escapeAttr(detailsId) + '"' : '') + '>' +
    '<summary class="subagent-summary">' +
    '<span class="subagent-summary-main">' +
    '<span class="subagent-summary-title">' + escapeHtml(title) + '</span>' +
    '<span class="subagent-summary-meta">' + escapeHtml(meta) + '</span>' +
    '</span>' +
    '<span>' + (matches.length ? '&#9662;' : '&#9432;') + '</span>' +
    '</summary>' +
    '<div class="subagent-content">';
  if (matches.length) {
    for (var i = 0; i < matches.length; i++) html += renderSubagentConversation(matches[i]);
  } else {
    html += '<div class="subagent-empty">这次 Agent 调用没有找到可嵌入的子会话 transcript。</div>';
  }
  html += '</div></details></div></div>';
  return html;
}

function conversationDisplayDate(conv) {
  return conv.last_active_at || conv.updated_at || conv.date || conv.created_at || conv.timestamp || '';
}

function conversationSortTime(conv) {
  var raw = conversationDisplayDate(conv);
  var value = new Date(raw || 0).getTime();
  return isNaN(value) ? 0 : value;
}

function groupByDate(convs) {
  var groups = {};
  for (var i = 0; i < convs.length; i++) {
    var c = convs[i];
    var d = conversationDisplayDate(c);
    var label = d ? new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : 'Unknown Date';
    if (!groups[label]) groups[label] = [];
    groups[label].push(c);
  }
  var entries = [];
  for (var label in groups) entries.push({ label: label, items: groups[label] });
  return entries;
}

function groupByWorkspace(convs) {
  var groups = {};
  for (var i = 0; i < convs.length; i++) {
    var c = convs[i];
    var key = getWorkspaceKey(c);
    if (!groups[key]) groups[key] = [];
    groups[key].push(c);
  }
  var entries = [];
  for (var key in groups) {
    entries.push({
      label: getWorkspaceShortLabel(key),
      title: getWorkspaceLabel(key),
      items: groups[key],
    });
  }
  entries.sort(function(a, b) {
    return a.title.localeCompare(b.title);
  });
  return entries;
}

function badgeFor(source) {
  var s = (source || '').toLowerCase();
  if (s.indexOf('codex') >= 0) return '<span class="badge badge-codex">Codex</span>';
  if (s.indexOf('ag') >= 0 || s.indexOf('antigravity') >= 0) return '<span class="badge badge-ag">AG</span>';
  return '<span class="badge badge-claude">Claude</span>';
}

function sourceKey(source) {
  var s = (source || '').toLowerCase();
  if (s.indexOf('codex') >= 0) return 'codex';
  if (s.indexOf('ag') >= 0 || s.indexOf('antigravity') >= 0) return 'ag';
  return 'claude';
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function copyText(text, btn, originalLabel) {
  function markCopied() {
    if (!btn) return;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = originalLabel;
      btn.classList.remove('copied');
    }, 1500);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(markCopied).catch(function() {
      fallbackCopyText(text);
      markCopied();
    });
    return;
  }

  fallbackCopyText(text);
  markCopied();
}

function fallbackCopyText(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

function getConversationFilePath(conv) {
  if (!conv) return '';
  if (conv.transcript_path) return String(conv.transcript_path);
  if (conv.file) return EXPORT_BASE_PATH + '/' + String(conv.file).replace(/^\/+/, '');
  return '';
}

function getConversationViewerLink(conv) {
  var base = window.location.href.split('#')[0];
  return base + '#conv=' + encodeURIComponent(conv.id || '');
}

function buildConversationRef(conv) {
  return [
    'Conversation reference',
    '- ID: ' + (conv.id || ''),
    '- Source: ' + (conv.source || ''),
    '- Viewer: ' + getConversationViewerLink(conv),
    '- Transcript: ' + getConversationFilePath(conv),
    '- Search fallback: /Users/lizeyu/.claude/exported_conversations/conversations.json',
  ].join('\n');
}

function buildConversationPrompt(conv) {

    '请先查看这段历史对话，再继续回答。',
    '',
    '定位信息：',
    '- conversation id: ' + (conv.id || ''),
    '- viewer deep link: ' + getConversationViewerLink(conv),
    '- transcript markdown: ' + getConversationFilePath(conv),
    '',
    '如果无法直接打开 viewer deep link，就读取 transcript markdown；如果 transcript 不存在，再到 /Users/lizeyu/.claude/exported_conversations/conversations.json 里按 conversation id 搜索。',
  ].join('\n');
}

function syncLocationHash(id) {
  var nextHash = id ? '#conv=' + encodeURIComponent(id) : '';
  if (window.location.hash === nextHash) return;
  history.replaceState(null, '', nextHash || window.location.pathname + window.location.search);
}

function getConversationIdFromLocation() {
  if (!window.location.hash) return '';
  var raw = window.location.hash.replace(/^#/, '');
  if (!raw) return '';
  if (raw.indexOf('conv=') === 0) {
    return decodeURIComponent(raw.slice(5));
  }
  return decodeURIComponent(raw);
}

function selectConversationFromLocation() {
  var requestedId = getConversationIdFromLocation();
  if (!requestedId) return;
  for (var i = 0; i < allConversations.length; i++) {
    if (allConversations[i].id === requestedId) {
      selectConversation(requestedId);
      return;
    }
  }
}

function applyTheme(nextIsDark) {

}

function loadThemePreference() {

function applyReadingMode(nextMode) {
  if (nextMode !== 'mainline' && nextMode !== 'mainline_plus' && nextMode !== 'forensics') {
    nextMode = 'mainline_plus';
  }

}

function loadReadingModePreference() {

    if (saved) {
      applyReadingMode(saved);
