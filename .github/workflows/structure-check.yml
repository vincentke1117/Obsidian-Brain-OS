name: Structure Check

on:
  pull_request:
    branches: [main]

jobs:
  structure-check:
    name: Verify skill and script structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check every skill has SKILL.md
        run: |
          FAIL=0
          # Skip known container/meta directories
          SKIP="recommended"
          for dir in skills/*/; do
            skill=$(basename "$dir")
            # Skip container directories
            if echo "$SKIP" | grep -qw "$skill"; then
              echo "[skip] skills/$skill/ (container directory)"
              continue
            fi
            # Accept both SKILL.md and skill.md (case-insensitive)
            if [ ! -f "$dir/SKILL.md" ] && [ ! -f "$dir/skill.md" ]; then
              echo "❌ Missing SKILL.md in skills/$skill/"
              FAIL=1
            else
              echo "✅ skills/$skill/"
            fi
          done
          exit $FAIL

      - name: Check scripts have shebang and usage comment
        run: |
          FAIL=0
          for f in scripts/*.sh scripts/*.py; do
            [ -f "$f" ] || continue
            if ! head -1 "$f" | grep -qE '^#!'; then
              echo "❌ Missing shebang: $f"
              FAIL=1
            else
              echo "✅ $f"
            fi
          done
          exit $FAIL
